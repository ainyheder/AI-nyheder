# =====================================================================
# Automatisk crawl af AI-nyheder
# ---------------------------------------------------------------------
# Denne workflow koerer paa GitHubs servere (gratis) og:
#   1. Koerer crawler.py hver 6. time (crawl + AI-omskrivning til dansk)
#   2. Committer den nye data/articles.json til main
#   3. GitHub Pages serverer derefter automatisk den nye version
#
# AI-omskrivningen kraever en repository secret ved navn ANTHROPIC_API_KEY
# (Settings -> Secrets and variables -> Actions). Uden den vises artiklerne
# paa engelsk - alt andet virker stadig.
# =====================================================================

name: Crawl AI-nyheder

on:
  schedule:
    - cron: "0 */6 * * *"   # hver 6. time (UTC)
  workflow_dispatch:         # goer det muligt at koere den manuelt
  push:
    branches: [main]         # koer ogsaa ved push, saa siden altid har friske data

permissions:
  contents: write            # workflow'en skal have lov at committe data-filen

concurrency:
  group: crawl
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Koer crawleren (AI-omskrivning hvis noeglen findes)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 crawler.py

      - name: Commit de nye artikler
        run: |
          git config user.name "ai-news-bot"
          git config user.email "actions@github.com"
          git add data/articles.json
          git diff --staged --quiet || git commit -m "Automatisk opdatering af nyheder"
          git push
