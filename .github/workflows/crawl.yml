# =====================================================================
# Automatisk crawl af AI-nyheder
# ---------------------------------------------------------------------
# Denne workflow kører på GitHubs servere (gratis) og:
#   1. Kører crawler.py hver 6. time
#   2. Committer den nye data/articles.json til main
#   3. GitHub Pages serverer derefter automatisk den nye version
#
# I behøver IKKE gøre noget for at den kører - den passer sig selv.
# I kan også starte den manuelt: fanen "Actions" -> "Crawl AI-nyheder"
# -> "Run workflow".
# =====================================================================

name: Crawl AI-nyheder

on:
  schedule:
    - cron: "0 4-21 * * *"   # hver time i dagtimerne (ca. 6-23 dansk tid)
    - cron: "0 1 * * *"      # én natlig kørsel (ca. kl. 3 dansk tid)
  workflow_dispatch:         # gør det muligt at køre den manuelt
    inputs:
      genkoer_alt:
        description: "Genkoer: ja = hele arkivet, soegeord = kun matchende artikler, nej = kun nye"
        default: "nej"
        required: false
  push:
    branches: [main]         # kør også ved push, så siden altid har friske data

permissions:
  contents: write            # workflow'en skal have lov at committe data-filen

concurrency:
  group: crawl
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Hent koden
        uses: actions/checkout@v4

      - name: Installér Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Kør crawleren (med AI-omskrivning hvis en nøgle findes)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          AA_API_KEY: ${{ secrets.AA_API_KEY }}
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
          AI_UDBYDER: ${{ vars.AI_UDBYDER }}
          GENKOER_ALT: ${{ inputs.genkoer_alt || vars.GENKOER_ALT }}
        run: |
          pip install pillow -q
          python3 crawler.py

      - name: Commit de nye artikler
        run: |
          git config user.name "ai-news-bot"
          git config user.email "actions@github.com"
          git add data feed.xml
          git add uge.html feed-uge.xml 2>/dev/null || true
          # Commit kun hvis der faktisk er ændringer
          git diff --staged --quiet || git commit -m "🤖 Automatisk opdatering af nyheder"
          git push
